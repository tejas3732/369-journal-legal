<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>369 Journal</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fbf6ee;
      --ink: #211915;
      --muted: #75665c;
      --accent: #b15a32;
      --card: #fffaf3;
      --line: rgba(33, 25, 21, 0.12);
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 64px 22px;
    }
    h1 {
      font-size: clamp(40px, 8vw, 72px);
      line-height: 0.95;
      margin: 0 0 16px;
      letter-spacing: 0;
    }
    p {
      font-size: 18px;
      color: var(--muted);
      margin: 0 0 24px;
    }
    nav {
      display: grid;
      gap: 12px;
      margin-top: 32px;
    }
    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <main>
    <h1>369 Journal</h1>
    <p>A private iPhone manifestation journal for the 369 method.</p>
    <nav>
      <a class="card" href="./privacy.html">Privacy Policy</a>
      <a class="card" href="./support.html">Support</a>
    </nav>
  </main>
</body>
</html>
